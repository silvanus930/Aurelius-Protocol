name: Prune old GHCR container versions

# Keeps the GHCR package list bounded by deleting stale commit-SHA-tagged
# versions that aren't part of a named release. Runs nightly. Always keeps:
#   - any version with a tag matching `testnet`, `main`, `latest`, or `v<semver>`
#   - the most recent `KEEP_RECENT` commit-SHA versions per package (safety
#     buffer for rollback)
#
# Manual trigger via "Run workflow" is also supported for on-demand cleanup.

on:
  schedule:
    - cron: "0 3 * * *"  # daily at 03:00 UTC
  workflow_dispatch:
    inputs:
      keep_recent:
        description: "How many recent untagged/SHA-tagged versions to keep"
        required: false
        default: "5"
        type: string

permissions:
  packages: write

jobs:
  prune:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [aurelius-validator, aurelius-miner, aurelius-concordia]
    steps:
      - uses: actions/github-script@v7
        env:
          PKG: ${{ matrix.package }}
          KEEP_RECENT: ${{ inputs.keep_recent || '5' }}
        with:
          script: |
            const pkg = process.env.PKG;
            const org = 'Aurelius-Protocol';
            const keepRecent = parseInt(process.env.KEEP_RECENT, 10);
            const protectedTagPattern = /^(testnet|main|latest|v\d+\.\d+\.\d+.*)$/;

            const versions = [];
            for (let page = 1; ; page++) {
              const { data } = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
                package_type: 'container',
                package_name: pkg,
                org,
                per_page: 100,
                page,
              });
              if (data.length === 0) break;
              versions.push(...data);
              if (data.length < 100) break;
            }

            const protect = [];
            const candidates = [];
            for (const v of versions) {
              const tags = (v.metadata && v.metadata.container && v.metadata.container.tags) || [];
              if (tags.some(t => protectedTagPattern.test(t))) {
                protect.push(v);
              } else {
                candidates.push(v);
              }
            }

            candidates.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const toDelete = candidates.slice(keepRecent);

            core.info(
              `${pkg}: total=${versions.length} protected=${protect.length} ` +
              `keeping=${Math.min(keepRecent, candidates.length)} deleting=${toDelete.length}`
            );

            for (const v of toDelete) {
              const tagLabel = (v.metadata.container.tags || []).join(',') || '<untagged>';
              try {
                await github.rest.packages.deletePackageVersionForOrg({
                  package_type: 'container',
                  package_name: pkg,
                  org,
                  package_version_id: v.id,
                });
                core.info(`  deleted version ${v.id} (tags: ${tagLabel})`);
              } catch (e) {
                core.warning(`  failed to delete version ${v.id} (tags: ${tagLabel}): ${e.message}`);
              }
            }
