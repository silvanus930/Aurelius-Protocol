name: CI

on:
  push:
    branches: [main, testnet]
    # Publish versioned images on semver tags (e.g. `v1.2.3`). Third-party
    # operators pin to these tags instead of `:latest` so a bad push to
    # `main` can't reach them automatically. See `docker-compose.validator.yml`
    # and VALIDATOR_SETUP.md §Upgrades.
    tags: ["v*.*.*"]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [main, testnet]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check aurelius/
      - run: ruff format --check aurelius/

  test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[ml,simulation,dev]"
      - run: pytest tests/ --ignore=tests/e2e --ignore=tests/common/test_embeddings.py -x --tb=short

  docker-build:
    # Build on main pushes (re-tagging :latest and :<sha>), on testnet pushes
    # (tagging :testnet and :<sha>), and on semver tag pushes (re-tagging
    # :vX.Y.Z for third-party pinning — B-2).
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/testnet' ||
       startsWith(github.ref, 'refs/tags/v'))
    needs: [lint, docker-build-concordia]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        role: [validator, miner]

    steps:
      - name: Free runner disk space
        # The ubuntu-latest runner ships ~14 GB free; our image exceeds that
        # with ML + sim extras, causing "No space left on device" mid-build.
        # This action frees ~30 GB by removing preinstalled toolchains we
        # don't use (dotnet, android, haskell, tool-cache, swap).
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true

      - uses: actions/checkout@v4

      - name: Lowercase owner for GHCR
        id: repo
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ steps.repo.outputs.owner }}/aurelius-${{ matrix.role }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: Dockerfile.node
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DEFAULT_CMD=aurelius-${{ matrix.role }}
            CONCORDIA_IMAGE_DIGEST=${{ needs.docker-build-concordia.outputs.concordia_digest }}

  docker-build-concordia:
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/testnet' ||
       startsWith(github.ref, 'refs/tags/v'))
    needs: [lint]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
    outputs:
      concordia_digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true

      - uses: actions/checkout@v4

      - name: Lowercase owner for GHCR
        id: repo
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ steps.repo.outputs.owner }}/aurelius-concordia
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: useblacksmith/build-push-action@v2
        id: build-push
        with:
          context: aurelius/simulation/
          file: aurelius/simulation/Dockerfile.concordia
          push: true
          # Disable attestations — the legacy v3 repo's prior pushes left
          # provenance blobs in aurelius-concordia whose HEAD-checks our
          # token can't satisfy, causing 403 on every re-push. Supply-chain
          # guarantee is provided by the digest exported from this job's
          # outputs and baked into the validator/miner image via build-arg.
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
